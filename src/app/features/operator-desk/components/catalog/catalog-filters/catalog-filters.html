<div class="catalog-filters">
  <label class="catalog-filters__field">
    <span class="catalog-filters__label">Category</span>
    <select
      class="catalog-filters__input"
      [value]="category"
      (change)="setCategory($any($event.target).value)"
    >
      @for (item of categories; track item) {
        <option [value]="item">{{ item }}</option>
      }
    </select>
  </label>

  <label class="catalog-filters__field">
    <span class="catalog-filters__label">Availability</span>
    <select
      class="catalog-filters__input"
      [value]="availability"
      (change)="setAvailability($any($event.target).value)"
    >
      @for (item of availabilityOptions; track item) {
        <option [value]="item">{{ item }}</option>
      }
    </select>
  </label>

  <div class="catalog-filters__chips">
    @for (item of presets; track item) {
      <button
        type="button"
        class="catalog-filters__chip"
        [class.catalog-filters__chip--active]="preset === item"
        (click)="setPreset(item)"
      >
        {{ item }}
      </button>
    }
  </div>
</div>
