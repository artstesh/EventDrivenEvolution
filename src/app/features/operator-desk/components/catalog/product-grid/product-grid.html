<section class="product-grid">
  <div class="product-grid__header">
    <div class="product-grid__meta">
      <span class="product-grid__meta-label">Search results</span>
      <span class="product-grid__meta-value">Displayed {{ catalog()?.items?.length ?? 0 }}
        of {{ catalog()?.total ?? 0 }}</span>
    </div>

    <div class="product-grid__pager">
      <button type="button" class="product-grid__pager-button">←</button>
      <span class="product-grid__pager-value">Page {{ catalog()?.page ?? 1 }} / {{ catalog()?.totalPages ?? 1 }}</span>
      <button type="button" class="product-grid__pager-button">→</button>
    </div>
  </div>

  <div class="product-grid__list">
    @for (product of catalog()?.items; track product.sku) {
      <app-product-card [product]="product"></app-product-card>
    }
  </div>
</section>
