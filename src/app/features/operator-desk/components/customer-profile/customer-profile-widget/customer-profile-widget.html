<section class="customer-profile-widget">
  <div class="customer-profile-widget__header">
    <div>
      <div class="customer-profile-widget__eyebrow">Профиль клиента</div>
      <h3 class="customer-profile-widget__title">{{ fullName }}</h3>
    </div>

    <span class="customer-profile-widget__vip">
      {{ isVip ? 'VIP' : 'Стандарт' }}
    </span>
  </div>

  <div class="customer-profile-widget__balance">
    <div class="customer-profile-widget__balance-label">Баланс</div>
    <div class="customer-profile-widget__balance-value">{{ balance }}</div>
  </div>

  <div class="customer-profile-widget__metrics">
    <div class="customer-profile-widget__metric">
      <span class="customer-profile-widget__metric-label">Лояльность</span>
      <span class="customer-profile-widget__metric-value">{{ loyaltyLevel }}</span>
    </div>

    <div class="customer-profile-widget__metric">
      <span class="customer-profile-widget__metric-label">Сегмент</span>
      <span class="customer-profile-widget__metric-value">{{ segment }}</span>
    </div>

    <div class="customer-profile-widget__metric">
      <span class="customer-profile-widget__metric-label">Последний заказ</span>
      <span class="customer-profile-widget__metric-value">{{ lastOrderAt }}</span>
    </div>
  </div>

  <div class="customer-profile-widget__history">
    <button type="button" class="customer-profile-widget__button">
      История заказов
    </button>
  </div>
</section>
