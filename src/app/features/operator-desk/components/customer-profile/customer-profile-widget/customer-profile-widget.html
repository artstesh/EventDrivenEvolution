<section class="customer-profile-widget">
  <div class="customer-profile-widget__header">
    <div>
      <div class="customer-profile-widget__eyebrow">Client details</div>
      <h3 class="customer-profile-widget__title">{{ customer()?.fullName }}</h3>
    </div>

    <span class="customer-profile-widget__vip">
      {{ customer()?.isVip ? 'VIP' : 'Standard' }}
    </span>
  </div>

  <div class="customer-profile-widget__balance">
    <div class="customer-profile-widget__balance-label">Balance</div>
    <div class="customer-profile-widget__balance-value">${{ customer()?.balance??0 }}</div>
  </div>

  <div class="customer-profile-widget__metrics">
    <div class="customer-profile-widget__metric">
      <span class="customer-profile-widget__metric-label">Loyalty</span>
      <span class="customer-profile-widget__metric-value">{{ customer()?.loyaltyLevel??'???' }}</span>
    </div>

    <div class="customer-profile-widget__metric">
      <span class="customer-profile-widget__metric-label">Segment</span>
      <span class="customer-profile-widget__metric-value">{{ customer()?.segment??'???' }}</span>
    </div>

    <div class="customer-profile-widget__metric">
      <span class="customer-profile-widget__metric-label">Last order</span>
      <span class="customer-profile-widget__metric-value">{{ customer()?.lastOrderAt | date:'mediumDate' }}</span>
    </div>
  </div>

  <div class="customer-profile-widget__history">
    <button type="button" class="customer-profile-widget__button" (click)="showOrderHistory()">
      Order history
    </button>
  </div>
</section>
