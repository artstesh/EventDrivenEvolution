<div class="operator-desk-shell">
  <header class="operator-desk-shell__header">
    <app-operator-header></app-operator-header>
  </header>

  <main class="operator-desk-shell__content">
    <aside class="operator-desk-shell__sidebar operator-desk-shell__sidebar--left">
      <section class="operator-desk-shell__section">
        <app-call-status-panel></app-call-status-panel>
      </section>

      <section class="operator-desk-shell__section">
        <app-customer-profile-widget
        ></app-customer-profile-widget>
      </section>

      <section class="operator-desk-shell__section">
        <app-operator-status-switch></app-operator-status-switch>
      </section>
    </aside>

    <section class="operator-desk-shell__workspace">
      <div class="operator-desk-shell__catalog">
        <app-catalog-search-panel></app-catalog-search-panel>
        <app-product-grid></app-product-grid>
      </div>
    </section>

    <aside class="operator-desk-shell__sidebar operator-desk-shell__sidebar--right">
      <section class="operator-desk-shell__section">
        <app-cart-widget></app-cart-widget>
      </section>

      <section class="operator-desk-shell__section operator-desk-shell__section--compact">
        <div class="operator-desk-shell__actions">
          <button type="button" class="operator-desk-shell__action" (click)="endCall()">
            End call
          </button>

          <button type="button" class="operator-desk-shell__action operator-desk-shell__action--primary" (click)="placeOrder()">
            Place Order
          </button>
        </div>
      </section>
    </aside>
  </main>

  <app-modal-host></app-modal-host>
</div>
