<section class="cart-widget">
  <div class="cart-widget__header">
    <div>
      <div class="cart-widget__eyebrow">Корзина текущего заказа</div>
      <h3 class="cart-widget__title">{{ itemCount }} позиций</h3>
    </div>

    <span class="cart-widget__badge">Обновлено</span>
  </div>

  <div class="cart-widget__items">
    <article class="cart-widget__item" *ngFor="let item of items">
      <div class="cart-widget__item-info">
        <div class="cart-widget__item-name">{{ item.name }}</div>
        <div class="cart-widget__item-meta">{{ item.quantity }} × {{ item.unitPrice }}</div>
      </div>
      <div class="cart-widget__item-sum">{{ item.totalPrice }}</div>
    </article>
  </div>

  <div class="cart-widget__summary">
    <div class="cart-widget__summary-row">
      <span class="cart-widget__summary-label">Скидка</span>
      <span class="cart-widget__summary-value">{{ discount }}</span>
    </div>

    <div class="cart-widget__summary-row">
      <span class="cart-widget__summary-label">Подытог</span>
      <span class="cart-widget__summary-value">{{ subtotal }}</span>
    </div>

    <div class="cart-widget__summary-row cart-widget__summary-row--total">
      <span class="cart-widget__summary-label">Итого</span>
      <span class="cart-widget__summary-value">{{ total }}</span>
    </div>
  </div>

  <div class="cart-widget__actions">
    <button type="button" class="cart-widget__button">
      Очистить
    </button>

    <button type="button" class="cart-widget__button cart-widget__button--primary">
      Оформить заказ
    </button>
  </div>
</section>
