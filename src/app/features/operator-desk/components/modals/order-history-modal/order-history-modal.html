<div class="order-history-modal" role="dialog" aria-modal="true" aria-labelledby="order-history-title">
  <div class="order-history-modal__backdrop" (click)="close()"></div>

  <section class="order-history-modal__window">
    <header class="order-history-modal__header">
      <div>
        <div class="order-history-modal__eyebrow">Order history</div>
        <h3 class="order-history-modal__title" id="order-history-title">
          Client's orders
        </h3>
      </div>

      <button type="button" class="order-history-modal__close" aria-label="Close" (click)="close()">
        ×
      </button>
    </header>

    <div class="order-history-modal__customer">
      <div class="order-history-modal__avatar">А</div>

      <div class="order-history-modal__customer-info">
        <div class="order-history-modal__name">{{ customer()?.fullName }}</div>
        <div class="order-history-modal__meta">
          <span>{{ customer()?.isVip ? 'VIP' : 'Standard' }}</span>
          <span class="order-history-modal__separator"></span>
          <span>{{orders()?.length ?? 0}} orders</span>
        </div>
      </div>
    </div>

    @for(order of orders(); track order) {
      <article class="order-history-modal__item">
        <div class="order-history-modal__item-main">
          <div class="order-history-modal__item-title">Order №{{order.orderNumber}}</div>
          <div class="order-history-modal__item-meta">{{order.createdAt | date:'mediumDate'}} · {{order.status}}</div>
        </div>
        <div class="order-history-modal__item-sum">${{order.total}}</div>
      </article>
    }

    <div class="order-history-modal__footer">
      <button type="button" class="order-history-modal__button" (click)="close()">
        Close
      </button>
    </div>
  </section>
</div>
