<div *ngIf="opened" class="confirm-discount-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-discount-title">
  <div class="confirm-discount-modal__backdrop" (click)="closed.emit()"></div>

  <section class="confirm-discount-modal__window">
    <header class="confirm-discount-modal__header">
      <div>
        <div class="confirm-discount-modal__eyebrow">Подтверждение скидки</div>
        <h3 class="confirm-discount-modal__title" id="confirm-discount-title">
          Согласование с супервайзером
        </h3>
      </div>

      <button type="button" class="confirm-discount-modal__close" aria-label="Закрыть" (click)="closed.emit()">
        ×
      </button>
    </header>

    <div class="confirm-discount-modal__summary">
      <div class="confirm-discount-modal__summary-row">
        <span class="confirm-discount-modal__label">Сумма корзины</span>
        <span class="confirm-discount-modal__value">{{ cartSubtotal }}</span>
      </div>

      <div class="confirm-discount-modal__summary-row">
        <span class="confirm-discount-modal__label">Скидка</span>
        <span class="confirm-discount-modal__value confirm-discount-modal__value--accent">{{ discount }}</span>
      </div>

      <div class="confirm-discount-modal__summary-row confirm-discount-modal__summary-row--total">
        <span class="confirm-discount-modal__label">Итого к оплате</span>
        <span class="confirm-discount-modal__value">{{ total }}</span>
      </div>
    </div>

    <label class="confirm-discount-modal__field">
      <span class="confirm-discount-modal__label">Причина скидки</span>
      <textarea
        class="confirm-discount-modal__textarea"
        rows="4"
        [(ngModel)]="discountReason"
        placeholder="Например: лояльный клиент, компенсация, индивидуальное согласование"
      ></textarea>
    </label>

    <div class="confirm-discount-modal__footer">
      <button type="button" class="confirm-discount-modal__button" (click)="closed.emit()">
        Отмена
      </button>

      <button type="button" class="confirm-discount-modal__button confirm-discount-modal__button--primary" (click)="onConfirm()">
        Подтвердить
      </button>
    </div>
  </section>
</div>
