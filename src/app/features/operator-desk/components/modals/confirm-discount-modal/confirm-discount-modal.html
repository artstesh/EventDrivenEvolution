<div class="confirm-discount-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-discount-title">
  <div class="confirm-discount-modal__backdrop" (click)="close()"></div>

  <section class="confirm-discount-modal__window">
    <header class="confirm-discount-modal__header">
      <div>
        <div class="confirm-discount-modal__eyebrow">Discount Confirmation</div>
        <h3 class="confirm-discount-modal__title" id="confirm-discount-title">
          Approval by Supervisor
        </h3>
      </div>

      <button type="button" class="confirm-discount-modal__close" aria-label="Close" (click)="close()">
        ×
      </button>
    </header>

    <div class="confirm-discount-modal__summary">
      <div class="confirm-discount-modal__summary-row">
        <span class="confirm-discount-modal__label">Cart Total</span>
        <span class="confirm-discount-modal__value">{{ cart()?.subtotal??0 }}</span>
      </div>

      <div class="confirm-discount-modal__summary-row">
        <span class="confirm-discount-modal__label">Discount</span>
        <span class="confirm-discount-modal__value confirm-discount-modal__value--accent">{{ cart()?.discount??0 }}</span>
      </div>

      <div class="confirm-discount-modal__summary-row confirm-discount-modal__summary-row--total">
        <span class="confirm-discount-modal__label">Total Due</span>
        <span class="confirm-discount-modal__value">{{ cart()?.total??0 }}</span>
      </div>
    </div>

    <label class="confirm-discount-modal__field">
      <span class="confirm-discount-modal__label">Reason for Discount</span>
      <textarea
        class="confirm-discount-modal__textarea"
        rows="4"
        [(ngModel)]="discountReason"
        placeholder="For example: loyal customer, compensation, individual agreement."
      ></textarea>
    </label>

    <div class="confirm-discount-modal__footer">
      <button type="button" class="confirm-discount-modal__button" (click)="close()">
        Cancel
      </button>

      <button type="button" class="confirm-discount-modal__button confirm-discount-modal__button--primary" (click)="onConfirm()">
        Confirm
      </button>
    </div>
  </section>
</div>
