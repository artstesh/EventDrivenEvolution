<div class="toast-center" aria-live="polite" aria-atomic="true">
  @if (notifications.length) {
    <div class="toast-center__stack">
      @for (toast of notifications; track toast.id) {
        <article
          class="toast-center__toast"
          [class.toast-center__toast--success]="toast.type === 'success'"
          [class.toast-center__toast--info]="toast.type === 'info'"
          [class.toast-center__toast--warning]="toast.type === 'warning'"
          [class.toast-center__toast--error]="toast.type === 'error'"
        >
          <button type="button" class="toast-center__dismiss" aria-label="Close" (click)="dismiss(toast.id)">
            ×
          </button>

          <div class="toast-center__icon">
            @switch (toast.type) {
              @case ('success') {
                <span>✓</span>
              }
              @case ('info') {
                <span>i</span>
              }
              @case ('warning') {
                <span>!</span>
              }
              @default {
                <span>×</span>
              }
            }
          </div>

          <div class="toast-center__content">
            <div class="toast-center__title">{{ toast.title }}</div>
            <div class="toast-center__text">{{ toast.message }}</div>
          </div>
        </article>
      }
    </div>
  }
</div>
